name: Add Review

on:
  workflow_dispatch:
    inputs:
      name:
        required: true
      role:
        required: false
        default: ''
      text:
        required: true
      platform:
        required: true
      rating:
        required: true
      avatar_path:
        required: false
        default: ''

jobs:
  add:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.SAIFURPRO_GH_TOCKEN }}
          ref: master

      - name: Add review to JSON
        run: |
          python3 << 'EOF'
          import json, os, time, datetime

          try:
            with open('data/reviews.json') as f:
              reviews = json.load(f)
          except:
            reviews = []

          avatar_path = os.environ.get('AVATAR_PATH', '').strip()

          reviews.insert(0, {
            "id": int(time.time() * 1000),
            "name": os.environ['NAME'],
            "role": os.environ.get('ROLE', ''),
            "text": os.environ['TEXT'],
            "platform": os.environ['PLATFORM'],
            "rating": int(os.environ['RATING']),
            "avatar": avatar_path if avatar_path else None,
            "date": datetime.date.today().isoformat()
          })

          os.makedirs('data', exist_ok=True)
          with open('data/reviews.json', 'w') as f:
            json.dump(reviews, f, indent=2)

          print(f"Added review from {os.environ['NAME']}. Total: {len(reviews)}")
          EOF
        env:
          NAME:        ${{ inputs.name }}
          ROLE:        ${{ inputs.role }}
          TEXT:        ${{ inputs.text }}
          PLATFORM:    ${{ inputs.platform }}
          RATING:      ${{ inputs.rating }}
          AVATAR_PATH: ${{ inputs.avatar_path }}

      - name: Commit and push to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reviews.json
          git diff --staged --quiet || git commit -m "Add review from ${{ inputs.name }}"
          git push origin master
