name: Delete Item

on:
  workflow_dispatch:
    inputs:
      type:
        required: true
        description: 'review or portfolio'
      id:
        required: true
        description: 'Item ID to delete'

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.SAIFURPRO_GH_TOCKEN }}
          ref: master

      - name: Delete item from JSON
        run: |
          python3 << 'EOF'
          import json, os

          item_type = os.environ['TYPE']
          item_id   = int(os.environ['ID'])
          file_path = 'data/reviews.json' if item_type == 'review' else 'data/portfolio.json'

          with open(file_path) as f:
            items = json.load(f)

          before = len(items)
          items = [i for i in items if i['id'] != item_id]
          after = len(items)

          with open(file_path, 'w') as f:
            json.dump(items, f, indent=2)

          print(f"Deleted {before - after} item(s) of type '{item_type}' with id {item_id}")
          EOF
        env:
          TYPE: ${{ inputs.type }}
          ID:   ${{ inputs.id }}

      - name: Commit and push to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Delete ${{ inputs.type }} #${{ inputs.id }}"
          git push origin master
