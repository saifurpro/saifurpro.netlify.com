name: Add Portfolio Item

on:
  workflow_dispatch:
    inputs:
      title:
        required: true
      category:
        required: true
      image_path:
        required: true
      url:
        required: false
        default: ''

jobs:
  add:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.SAIFURPRO_GH_TOCKEN }}
          ref: master

      - name: Add portfolio item to JSON
        run: |
          python3 << 'EOF'
          import json, os, time, datetime

          try:
            with open('data/portfolio.json') as f:
              portfolio = json.load(f)
          except:
            portfolio = []

          image_path = os.environ['IMAGE_PATH']
          url = os.environ.get('URL', '').strip() or image_path

          portfolio.insert(0, {
            "id": int(time.time() * 1000),
            "title": os.environ['TITLE'],
            "category": os.environ['CATEGORY'],
            "image": image_path,
            "url": url,
            "date": datetime.date.today().isoformat()
          })

          os.makedirs('data', exist_ok=True)
          with open('data/portfolio.json', 'w') as f:
            json.dump(portfolio, f, indent=2)

          print(f"Added portfolio item: {os.environ['TITLE']}. Total: {len(portfolio)}")
          EOF
        env:
          TITLE:      ${{ inputs.title }}
          CATEGORY:   ${{ inputs.category }}
          IMAGE_PATH: ${{ inputs.image_path }}
          URL:        ${{ inputs.url }}

      - name: Commit and push to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/portfolio.json
          git diff --staged --quiet || git commit -m "Add portfolio: ${{ inputs.title }}"
          git push origin master
